name: Build And Upload To TestFlight

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  PROJECT_DIR: .
  SCHEME: Unity-iPhone
  ARCHIVE_PATH: build/Unity-iPhone.xcarchive
  EXPORT_PATH: build/export
  APP_BUNDLE_ID: com.lqlfreegames.ironcityios
  APP_SIGNING_CERTIFICATE: Apple Distribution

jobs:
  build-and-upload:
    runs-on: macos-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show Xcode version
        shell: bash
        run: |
          set -euo pipefail
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-version

      - name: Decode signing assets
        shell: bash
        env:
          IOS_CERTIFICATE_P12_BASE64: ${{ secrets.IOS_CERTIFICATE_P12_BASE64 }}
          IOS_APPSTORE_PROFILE_BASE64: ${{ secrets.IOS_APPSTORE_PROFILE_BASE64 }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import base64
          import os
          import pathlib

          temp = pathlib.Path(os.environ['RUNNER_TEMP'])
          temp.mkdir(parents=True, exist_ok=True)
          (temp / 'certificate.p12').write_bytes(base64.b64decode(os.environ['IOS_CERTIFICATE_P12_BASE64']))
          (temp / 'appstore.mobileprovision').write_bytes(base64.b64decode(os.environ['IOS_APPSTORE_PROFILE_BASE64']))
          PY

      - name: Inspect provisioning profile
        id: profile
        shell: bash
        run: |
          set -euo pipefail
          security cms -D -i "$RUNNER_TEMP/appstore.mobileprovision" > "$RUNNER_TEMP/profile.plist"
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c 'Print UUID' "$RUNNER_TEMP/profile.plist")
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c 'Print Name' "$RUNNER_TEMP/profile.plist")
          echo "profile_uuid=$PROFILE_UUID" >> "$GITHUB_OUTPUT"
          echo "profile_name=$PROFILE_NAME" >> "$GITHUB_OUTPUT"

      - name: Install certificate
        shell: bash
        env:
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$RUNNER_TEMP/certificate.p12" -P "$IOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db
          security default-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Install provisioning profile
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$RUNNER_TEMP/appstore.mobileprovision" "$HOME/Library/MobileDevice/Provisioning Profiles/${{ steps.profile.outputs.profile_uuid }}.mobileprovision"

      - name: Configure App Store Connect API key
        shell: bash
        env:
          APPSTORE_CONNECT_KEY_ID: ${{ secrets.APPSTORE_CONNECT_KEY_ID }}
          APPSTORE_CONNECT_PRIVATE_KEY: ${{ secrets.APPSTORE_CONNECT_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.appstoreconnect/private_keys"
          printf '%s' "$APPSTORE_CONNECT_PRIVATE_KEY" > "$HOME/.appstoreconnect/private_keys/AuthKey_${APPSTORE_CONNECT_KEY_ID}.p8"
          chmod 600 "$HOME/.appstoreconnect/private_keys/AuthKey_${APPSTORE_CONNECT_KEY_ID}.p8"

      - name: Install CocoaPods dependencies
        shell: bash
        working-directory: ${{ env.PROJECT_DIR }}
        env:
          COCOAPODS_DISABLE_STATS: "true"
        run: |
          set -euo pipefail
          pod install

      - name: Resolve Xcode container
        id: resolve_xcode_container
        shell: bash
        run: |
          set -euo pipefail
          if [ -d "$PROJECT_DIR/Unity-iPhone.xcworkspace" ]; then
            echo "container_flag=-workspace" >> "$GITHUB_OUTPUT"
            echo "container_path=$PROJECT_DIR/Unity-iPhone.xcworkspace" >> "$GITHUB_OUTPUT"
          else
            echo "container_flag=-project" >> "$GITHUB_OUTPUT"
            echo "container_path=$PROJECT_DIR/Unity-iPhone.xcodeproj" >> "$GITHUB_OUTPUT"
          fi

      - name: Archive app
        shell: bash
        env:
          IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
          PROFILE_NAME: ${{ steps.profile.outputs.profile_name }}
        run: |
          set -euo pipefail
          xcodebuild clean archive \
            "${{ steps.resolve_xcode_container.outputs.container_flag }}" \
            "${{ steps.resolve_xcode_container.outputs.container_path }}" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath "$ARCHIVE_PATH" \
            DEVELOPMENT_TEAM="$IOS_TEAM_ID" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="$APP_SIGNING_CERTIFICATE" \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME" \
            PROVISIONING_PROFILE_SPECIFIER_APP="$PROFILE_NAME"

      - name: Create export options plist
        shell: bash
        env:
          IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
          PROFILE_NAME: ${{ steps.profile.outputs.profile_name }}
        run: |
          set -euo pipefail
          cat > "$RUNNER_TEMP/exportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>destination</key>
            <string>export</string>
            <key>method</key>
            <string>app-store-connect</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${APP_BUNDLE_ID}</key>
              <string>${PROFILE_NAME}</string>
            </dict>
            <key>signingCertificate</key>
            <string>${APP_SIGNING_CERTIFICATE}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>teamID</key>
            <string>${IOS_TEAM_ID}</string>
          </dict>
          </plist>
          EOF

      - name: Export ipa
        shell: bash
        run: |
          set -euo pipefail
          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist "$RUNNER_TEMP/exportOptions.plist"

      - name: Upload to TestFlight
        shell: bash
        env:
          APPSTORE_CONNECT_KEY_ID: ${{ secrets.APPSTORE_CONNECT_KEY_ID }}
          APPSTORE_CONNECT_ISSUER_ID: ${{ secrets.APPSTORE_CONNECT_ISSUER_ID }}
        run: |
          set -euo pipefail
          IPA_PATH=$(find "$EXPORT_PATH" -name '*.ipa' -print -quit)
          test -n "$IPA_PATH"
          xcrun altool \
            --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$APPSTORE_CONNECT_KEY_ID" \
            --apiIssuer "$APPSTORE_CONNECT_ISSUER_ID"